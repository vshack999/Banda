/* ══════════════════════════════════════════════════
   FIREBASE HOOK
══════════════════════════════════════════════════ */
function useFirebase(){
  const [dbh,setDbh]=useState(null);
  const [data,setData]=useState(DEF);
  const [ready,setReady]=useState(false);

  useEffect(()=>{
    (async()=>{
      try{
        const {initializeApp}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
        const {getDatabase,ref,onValue,set}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js");
        const app=initializeApp(FB);
        const db=getDatabase(app);
        onValue(ref(db,"dehatiAdda"),snap=>{const d=snap.val();if(d)setData(d);});
        setDbh({db,ref,set});
      }catch(e){console.warn("Firebase offline — using defaults");}
      setReady(true);
    })();
  },[]);

  const save=async(nd)=>{
    if(!dbh)return false;
    try{await dbh.set(dbh.ref(dbh.db,"dehatiAdda"),nd);return true;}catch{return false;}
  };
  return{data,save,ready};
}

/* ══════════════════════════════════════════════════
   INTERSECTION REVEAL HOOK
══════════════════════════════════════════════════ */
function useReveal(thr=0.12){
  const ref=useRef(null);
  const [vis,setVis]=useState(false);
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting){setVis(true);obs.disconnect();}},{threshold:thr});
    obs.observe(el);
    return()=>obs.disconnect();
  },[]);
  return[ref,vis];
}

/* ══════════════════════════════════════════════════
   CUSTOM CURSOR  (desktop only)
══════════════════════════════════════════════════ */
function Cursor(){
  const ring=useRef(null),dot=useRef(null);
  const m=useRef({x:-200,y:-200}),s=useRef({x:-200,y:-200});
  useEffect(()=>{
    const mv=e=>{m.current={x:e.clientX,y:e.clientY};};
    window.addEventListener("mousemove",mv);
    let raf;
    const loop=()=>{
      s.current.x+=(m.current.x-s.current.x)*0.1;
      s.current.y+=(m.current.y-s.current.y)*0.1;
      if(ring.current)ring.current.style.transform=`translate(${s.current.x-22}px,${s.current.y-22}px)`;
      if(dot.current)dot.current.style.transform=`translate(${m.current.x-3}px,${m.current.y-3}px)`;
      raf=requestAnimationFrame(loop);
    };
    raf=requestAnimationFrame(loop);
    return()=>{window.removeEventListener("mousemove",mv);cancelAnimationFrame(raf);};
  },[]);
  return(
    <>
      <div ref={ring} style={{position:"fixed",top:0,left:0,width:44,height:44,border:"1px solid rgba(200,169,110,.75)",borderRadius:"50%",pointerEvents:"none",zIndex:99999,mixBlendMode:"difference"}}/>
      <div ref={dot}  style={{position:"fixed",top:0,left:0,width:6,height:6,background:"#c8a96e",borderRadius:"50%",pointerEvents:"none",zIndex:99999,boxShadow:"0 0 6px #c8a96e"}}/>
    </>
  );
}

/* ══════════════════════════════════════════════════
   MARQUEE TICKER
══════════════════════════════════════════════════ */
function Marquee({text}){
  const r=(text||"").repeat(6);
  return(
    <div style={{background:"#c8a96e",overflow:"hidden",padding:"13px 0",
      borderTop:"1px solid rgba(240,237,232,.1)"}}>
      <div style={{display:"flex",whiteSpace:"nowrap",animation:"marquee 18s linear infinite"}}>
        {[r,r].map((t,i)=>(
          <span key={i} style={{fontFamily:"'Bebas Neue',cursive",
            fontSize:"clamp(.82rem,2vw,1.05rem)",letterSpacing:".25em",color:"#060606"}}>
            {t}
          </span>
        ))}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   LOOK CARD
══════════════════════════════════════════════════ */
function LookCard({item,i}){
  const [ref,vis]=useReveal();
  const [hov,setHov]=useState(false);
  return(
    <div ref={ref}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      onTouchStart={()=>setHov(true)} onTouchEnd={()=>setTimeout(()=>setHov(false),600)}
      style={{minWidth:"clamp(230px,70vw,300px)",height:"clamp(340px,78vw,440px)",
        position:"relative",flexShrink:0,overflow:"hidden",
        opacity:vis?1:0,transform:vis?"translateY(0)":"translateY(60px)",
        transition:`all .8s cubic-bezier(.16,1,.3,1) ${i*.1}s`}}>

      <img src={item.img}
        onError={e=>e.target.src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=600&q=80"}
        alt={item.title}
        style={{width:"100%",height:"100%",objectFit:"cover",
          transform:hov?"scale(1.07)":"scale(1)",transition:"transform .8s ease",
          filter:hov?"brightness(.44) contrast(1.12)":"brightness(.6) contrast(1.05) saturate(.85)"}}/>

        background:"linear-gradient(0deg,rgba(6,6,6,.96) 0%,rgba(6,6,6,.22) 55%,transparent 100%)"}}/>

   COLLECTION SECTION  — horizontal drag scroll
══════════════════════════════════════════════════ */
function Collection({data}){
  const [hRef,hVis]=useReveal();
  const track=useRef(null);
  const drag=useRef({on:false,x:0,sl:0});

  const dn=e=>{
    drag.current={on:true,x:e.pageX||e.touches?.[0]?.pageX,sl:track.current.scrollLeft};
    track.current.style.cursor="grabbing";
  };
  const mv=e=>{
    if(!drag.current.on)return;
    e.preventDefault();
    const x=e.pageX||e.touches?.[0]?.pageX;
    track.current.scrollLeft=drag.current.sl-(x-drag.current.x)*1.4;
  };
  const up=()=>{drag.current.on=false;if(track.current)track.current.style.cursor="grab";};

  return(
    <section style={{background:"#060606",padding:"6rem 0 5rem"}}>

      {/* Section header */}
      <div ref={hRef} style={{padding:"0 1.8rem",marginBottom:"3rem"}}>
        <div style={{overflow:"hidden",marginBottom:".5rem"}}>
          <div style={{fontFamily:"'Cormorant Garamond',serif",
            fontSize:"clamp(.7rem,1.4vw,.82rem)",letterSpacing:".5em",
            color:"#c8a96e",textTransform:"uppercase",fontStyle:"italic",
            transform:hVis?"translateY(0)":"translateY(110%)",opacity:hVis?1:0,
            transition:"all .8s cubic-bezier(.16,1,.3,1)"}}>
            {data.subtitle}
          </div>
        </div>
        <div style={{overflow:"hidden"}}>
          <div style={{fontFamily:"'Bebas Neue',cursive",
            fontSize:"clamp(2.6rem,8vw,5.5rem)",letterSpacing:".08em",
            transform:hVis?"translateY(0)":"translateY(110%)",
            transition:"all .9s cubic-bezier(.16,1,.3,1) .08s"}}>
            {data.title}
          </div>
        </div>
        <div style={{width:hVis?"75px":"0",height:"1px",background:"#c8a96e",
          marginTop:"1.4rem",transition:"width .8s ease .4s",
          boxShadow:"0 0 8px rgba(200,169,110,.5)"}}/>
      </div>

      {/* Drag hint */}
      <div style={{padding:"0 1.8rem",marginBottom:"1rem",
        fontFamily:"'Barlow',sans-serif",fontSize:".58rem",letterSpacing:".3em",
        color:"rgba(240,237,232,.18)",textTransform:"uppercase",
        display:"flex",alignItems:"center",gap:"1rem"}}>
        <div style={{width:"24px",height:"1px",background:"rgba(240,237,232,.12)"}}/>
        Drag to explore
        <div style={{width:"24px",height:"1px",background:"rgba(240,237,232,.12)"}}/>
      </div>

      {/* Cards horizontal scroll */}
      <div ref={track} className="drag-track"
        onMouseDown={dn} onMouseMove={mv} onMouseUp={up} onMouseLeave={up}
        onTouchStart={dn} onTouchMove={mv} onTouchEnd={up}
        style={{display:"flex",gap:"16px",overflowX:"auto",
          padding:"0 1.8rem 2rem",cursor:"grab",
          WebkitOverflowScrolling:"touch",userSelect:"none"}}>
        {(data.items||[]).map((item,i)=><LookCard key={item.id} item={item} i={i}/>)}
      </div>
    </section>
  );
}

/* ══════════════════════════════════════════════════
   ADMIN PANEL  — 5-tab glass CMS
══════════════════════════════════════════════════ */
function Admin({siteData,onSave,onClose}){
  const [auth,  setAuth  ]=useState(false);
  const [pw,    setPw    ]=useState("");
  const [err,   setErr   ]=useState(false);
  const [form,  setForm  ]=useState(()=>JSON.parse(JSON.stringify(siteData)));
  const [saving,setSaving]=useState(false);
  const [saved, setSaved ]=useState(false);
  const [tab,   setTab   ]=useState("hero");

  const login=()=>{
    if(pw==="dehati2026"){setAuth(true);setErr(false);}
    else{setErr(true);setTimeout(()=>setErr(false),1400);}
  };

  const doSave=async()=>{
    setSaving(true);
    const ok=await onSave(form);
    setSaving(false);
    if(ok!==false){setSaved(true);setTimeout(()=>setSaved(false),2500);}
  };

  /* deep get/set by dot-path */
  const gv=path=>path.split(".").reduce((o,k)=>(o==null?"":o[k]),form)??""
  const sv=(path,val)=>setForm(prev=>{
    const n=JSON.parse(JSON.stringify(prev));
    const ks=path.split(".");let o=n;
    for(let i=0;i<ks.length-1;i++){if(o[ks[i]]===undefined)o[ks[i]]={};o=o[ks[i]];}
    o[ks[ks.length-1]]=val;return n;
  });

  const INP={width:"100%",background:"rgba(200,169,110,.04)",
    border:"1px solid rgba(200,169,110,.15)",borderRadius:"3px",
    padding:"9px 13px",color:"#f0ede8",fontFamily:"'Barlow',sans-serif",
    fontSize:".8rem",outline:"none",boxSizing:"border-box"};
  const LBL={fontFamily:"'Barlow',sans-serif",fontSize:".57rem",
    letterSpacing:".22em",color:"rgba(200,169,110,.55)",
    textTransform:"uppercase",display:"block",marginBottom:"4px"};

  const F=({label,path,area})=>(
    <div style={{marginBottom:".85rem"}}>
      <label style={LBL}>{label}</label>
      {area
        ?<textarea value={gv(path)} rows={3} onChange={e=>sv(path,e.target.value)} style={{...INP,resize:"vertical"}}/>
        :<input    value={gv(path)}            onChange={e=>sv(path,e.target.value)} style={INP}/>
      }
    </div>
  );

  const TABS=[["hero","Hero"],["collection","Looks"],["featured","Featured"],["about","About"],["footer","Footer"]];

  return(
    <div style={{position:"fixed",inset:0,zIndex:99998,

      display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}}>

      <div style={{width:"100%",maxWidth:"500px",maxHeight:"92vh",

        border:"1px solid rgba(200,169,110,.15)",

        {/* ── Panel header ── */}
        <div style={{padding:"1.1rem 1.4rem",borderBottom:"1px solid rgba(200,169,110,.09)",
          display:"flex",justifyContent:"space-between",alignItems:"center",
          background:"rgba(200,169,110,.02)"}}>
          <div>
            <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:"1.05rem",letterSpacing:".2em",color:"#c8a96e"}}>
              ADMIN PANEL
            </div>
            <div style={{fontFamily:"'Barlow',sans-serif",fontSize:".55rem",
              letterSpacing:".2em",color:"rgba(200,169,110,.38)",textTransform:"uppercase",marginTop:"2px"}}>
              Dehati Adda CMS
            </div>
          </div>
          <button onClick={onClose}
            style={{background:"rgba(240,237,232,.05)",border:"1px solid rgba(240,237,232,.1)",
              color:"rgba(240,237,232,.5)",borderRadius:"2px",width:"30px",height:"30px",
              fontFamily:"'Barlow',sans-serif",fontSize:".85rem",flexShrink:0}}>
            ✕
          </button>
        </div>

        {/* ── Login ── */}
        {!auth?(
          <div style={{padding:"3rem 1.5rem",textAlign:"center"}}>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1rem",
              fontStyle:"italic",color:"rgba(240,237,232,.3)",marginBottom:"1.5rem"}}>

              onChange={e=>setPw(e.target.value)}

    </div>
  );

  const isDesktop               =window.matchMedia("(pointer:fine)").matches;

  return(
    <div style={{background:"#060606",minHeight:"100vh"}}>

      {!done&&<Preloader onDone={()=>setDone(true)}/>}

      {isDesktop&&<Cursor/>}

      <div style={{opacity:done?1:0,transition:"opacity .8s ease"}}>
        <Navbar    show={done}/>
        <Hero      data={data.hero} show={done}/>
        <Marquee   text={data.marquee?.text||DEF.marquee.text}/>
        <Collection data={data.collection}/>
        <Featured  data={data.featured}/>
        <About     data={data.about}/>
        <Footer    data={data.footer} trigger={()=>setAdmin(true)}/>
      </div>

      {adminOpen&&(
        <Admin siteData={data} onSave={save} onClose={()=>setAdmin(false)}/>
      )}

      {/* Firebase connection dot */}
      <div style={{position:"fixed",bottom:"12px",right:"12px",
        width:"6px",height:"6px",borderRadius:"50%",
        background:ready?"#c8a96e":"#333",
        boxShadow:ready?"0 0 8px rgba(200,169,110,.7)":"none",
        transition:"all .5s",zIndex:9000}}
        title={ready?"Firebase Connected":"Connecting…"}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
