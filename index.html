<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VS Hack Official</title>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #0a0b10; color: #ffffff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* Header Section */
        .header { width: 100%; padding: 20px; text-align: center; background: linear-gradient(180deg, #1a1c29 0%, transparent 100%); border-bottom: 1px solid #38bdf833; }
        .logo { font-size: 24px; font-weight: 800; color: #38bdf8; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Main Container */
        .container { width: 90%; max-width: 400px; margin-top: 30px; }
        
        /* Status Card */
        .status-card { background: #161b22; border-radius: 15px; padding: 20px; border-left: 5px solid #38bdf8; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px; }
        .status-title { font-size: 14px; color: #8b949e; margin-bottom: 5px; }
        .status-val { font-size: 18px; font-weight: bold; color: #00ff88; }

        /* Telegram Section (Glow Effect) */
        .tg-box { background: #0088cc; border-radius: 15px; padding: 25px; text-align: center; box-shadow: 0 0 20px rgba(0, 136, 204, 0.4); margin-bottom: 25px; transition: 0.3s; cursor: pointer; text-decoration: none; display: block; }
        .tg-box:active { transform: scale(0.95); }
        .tg-box h2 { color: white; margin-bottom: 5px; font-size: 20px; }
        .tg-box p { color: #e0f2fe; font-size: 13px; }

        /* Tools List */
        .tool-item { background: #21262d; border-radius: 12px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; border: 1px solid #30363d; }
        .tool-icon { width: 40px; height: 40px; background: #38bdf822; border-radius: 8px; margin-right: 15px; display: flex; align-items: center; justify-content: center; color: #38bdf8; }
        .tool-info h3 { font-size: 15px; }
        .tool-info p { font-size: 11px; color: #8b949e; }

        /* Footer */
        .footer { margin-top: auto; padding: 20px; font-size: 12px; color: #484f58; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">VS HACK SYSTEM</div>
    </div>

    <div class="container">
        <div class="status-card">
            <div class="status-title">Server Status</div>
            <div class="status-val">● ONLINE (V.1.0.2)</div>
        </div>

        <a href="https://t.me/vshack999" class="tg-box">
            <h2>JOIN OFFICIAL TELEGRAM</h2>
            <p>Get latest updates, tools & scripts here.</p>
        </a>

        <div class="tool-item">
            <div class="tool-icon">⚡</div>
            <div class="tool-info">
                <h3>Auto Bypass System</h3>
                <p>Advanced security bypass enabled.</p>
            </div>
        </div>

        <div class="tool-item">
            <div class="tool-icon">🛡️</div>
            <div class="tool-info">
                <h3>Secure Connection</h3>
                <p>End-to-end encrypted dashboard.</p>
            </div>
        </div>
    </div>

    <div class="footer">
        Developed by Vikas Sahu | © 2026
    </div>

</body>
</html>
