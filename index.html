<body>
<div class="glass-app" id="app">
  <div class="glass-card">
    <!-- header + light/dark toggle -->
    <div class="toggle-switch">
      <h1 style="font-size: 1.7rem;">✨ AI PromptForge</h1>
      <button class="gradient-btn secondary" style="padding: 10px 16px;" id="themeToggle">🌙 Dark</button>
    </div>

    <!-- Step 0: API key row (stored in localStorage) -->
    <div class="flex-row api-row" style="margin-bottom: 24px;">
      <input type="password" class="input-field" id="apiKeyInput" placeholder="OpenRouter API key" style="flex:1; background:transparent; border:none; padding:12px 0;" value="">
      <button class="gradient-btn" style="padding: 12px 20px;" id="saveApiKey">Save</button>
    </div>

    <!-- progress steps (simple) -->
    <div style="display: flex; justify-content: space-between; margin: 16px 0 30px; color:#aaa;">
      <span>💡 1.Idea</span><span>✨ 2.Analyze</span><span>⚙️ 3.Features</span><span>🎨 4.Theme</span><span>📄 5.Prompt</span>
    </div>

    <!-- STEP 1 – IDEA INPUT (always visible) -->
    <div id="step1">
      <h3>Describe your app idea</h3>
      <div class="flex-row">
        <input type="text" class="input-field" id="ideaInput" placeholder="e.g. Tournament app" value="Note taking app">
        <button class="mic-btn" id="micBtn" title="Speech to text">🎤</button>
        <button class="gradient-btn" id="sendIdeaBtn">Send</button>
      </div>
      <div id="speechTransition" class="hidden" style="margin-top:12px;">🎙️ listening...</div>
    </div>

    <!-- loading indicator (global) -->
    <div id="loadingIndicator" class="hidden" style="margin: 30px 0; text-align: center;"><div class="loader"></div><p style="margin-top:8px;">AI is thinking...</p></div>

    <!-- STEP 2 – AI idea analyzer results (5-7 cards) -->
    <div id="step2" class="hidden">
      <h3>Select trending idea</h3>
      <div id="ideaList" class="card-grid"></div>
      <button class="gradient-btn" id="confirmIdeaBtn" disabled>Next: features</button>
    </div>

    <!-- STEP 3 – feature selection -->
    <div id="step3" class="hidden">
      <h3>Pick features</h3>
      <button class="gradient-btn secondary" id="selectAllFeatures" style="margin-bottom: 12px; width:100%;">✅ ALL FEATURES</button>
      <div id="featuresList" class="card-grid"></div>
      <button class="gradient-btn" id="confirmFeaturesBtn" disabled>Next: theme & fonts</button>
    </div>

    <!-- STEP 4 – theme & font -->
    <div id="step4" class="hidden">
      <h3>Choose theme</h3>
      <div class="flex-row" style="flex-wrap:wrap; gap:8px;" id="themeOptions">
        <button class="pill" data-theme="Dark Glassmorphism">1 Dark Glass</button>
        <button class="pill" data-theme="Dark SaaS Dashboard">2 Dark SaaS</button>
        <button class="pill" data-theme="Cyberpunk Neon">3 Cyberpunk</button>
        <button class="pill" data-theme="Minimal Clean">4 Minimal</button>
        <button class="pill" data-theme="Dark Gradient">5 Dark Grad</button>
      </div>
      <h3 style="margin-top:20px;">Font pair</h3>
      <div class="flex-row" style="flex-wrap:wrap;" id="fontOptions">
        <button class="pill" data-font="A Poppins + Inter">A</button>
        <button class="pill" data-font="B Montserrat + Roboto">B</button>
        <button class="pill" data-font="C Space Grotesk + Inter">C</button>
        <button class="pill" data-font="D Outfit + DM Sans">D</button>
      </div>
      <button class="gradient-btn" id="generateFinalPromptBtn" style="margin-top:24px;">✨ Generate prompt</button>
    </div>

    <!-- STEP 5 – final prompt output + actions -->
    <div id="step5" class="hidden">
      <h3>Your professional prompt</h3>
      <div class="code-box" id="finalPromptDisplay"></div>
      <div class="flex-row" style="justify-content:space-evenly; margin: 16px 0;">
        <button class="gradient-btn secondary" id="copyPromptBtn">📋 Copy</button>
        <button class="gradient-btn secondary" id="downloadPromptBtn">⬇️ .txt</button>
        <button class="gradient-btn secondary" id="regeneratePromptBtn">🔄 Regenerate</button>
        <button class="gradient-btn secondary" id="sharePromptBtn">📤 Share</button>
      </div>
    </div>

    <!-- PROMPT HISTORY -->
    <hr style="margin: 30px 0; border-color: rgba(255,255,255,0.1);">
    <div>
      <div style="display: flex; justify-content: space-between;">
        <h3>📜 History (last 10)</h3>
        <button class="gradient-btn secondary" id="clearHistoryBtn" style="padding:8px 16px;">Clear</button>
      </div>
      <div id="historyContainer"></div>
    </div>

    <!-- error box -->
    <div id="errorMessage" class="hidden" style="background:#ff0033a0; border-radius:30px; padding:12px; margin-top:16px;"></div>
  </div>
</div>
