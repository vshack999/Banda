<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>AI Web App Prompt Generator</title>
  <!-- Google Fonts & dark glassmorphism base -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
      transition: background-color 0.3s ease, border-color 0.2s;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #1e1f2b, #0b0c15);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    /* light mode override (toggled by js) */
    body.light-mode {
      background: #eaeef5;
    }

    .glass-app {
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
    }

    /* floating glass card */
    .glass-card {
      background: rgba(20, 22, 35, 0.4);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 36px;
      box-shadow: 0 25px 50px -10px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.02);
      padding: 24px 20px;
      color: #eef3fc;
    }

    body.light-mode .glass-card {
      background: rgba(245, 248, 255, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.6);
      color: #151e2f;
    }

    h1, h2, h3, .heading-font {
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    h2 { font-size: 1.5rem; margin-bottom: 12px; }
    h3 { font-size: 1.2rem; margin-bottom: 8px; font-weight: 500; }

    /* gradient buttons */
    .gradient-btn {
      background: linear-gradient(145deg, #7f5af0, #2cb67d);
      border: none;
      border-radius: 60px;
      padding: 14px 24px;
      font-weight: 600;
      font-size: 1rem;
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 10px 20px -5px rgba(127, 90, 240, 0.5);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .gradient-btn:active { transform: scale(0.97); }
    .gradient-btn.secondary {
      background: linear-gradient(145deg, #3b2d5f, #1e4a6b);
      box-shadow: 0 6px 14px rgba(0,0,0,0.4);
    }

    .input-field {
      background: rgba(0,0,0,0.3);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 50px;
      padding: 16px 20px;
      width: 100%;
      font-size: 1rem;
      color: white;
      backdrop-filter: blur(5px);
    }
    body.light-mode .input-field {
      background: rgba(255,255,255,0.6);
      color: #0b0c15;
      border-color: #aaa;
    }

    .flex-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .mic-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      width: 56px;
      height: 56px;
      font-size: 1.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #d3baff;
    }

    /* numbered cards */
    .card-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 20px 0;
    }
    .idea-card, .feature-item {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 24px;
      padding: 16px 18px;
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.1s;
    }
    body.light-mode .idea-card, body.light-mode .feature-item {
      background: #ffffffc9;
      border-color: #cdd9ff;
      color: #10141e;
    }
    .idea-card.selected, .feature-item.selected {
      border: 2px solid #7f5af0;
      background: rgba(127, 90, 240, 0.2);
    }
    .card-num {
      background: #2cb67d;
      width: 32px;
      height: 32px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: black;
    }

    .pill {
      background: #23253b;
      padding: 8px 14px;
      border-radius: 40px;
      font-size: 0.9rem;
      display: inline-block;
    }

    /* loading spinner */
    .loader {
      width: 28px;
      height: 28px;
      border: 3px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      border-top-color: #7f5af0;
      animation: spin 1s infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .history-item {
      background: rgba(0,0,0,0.3);
      border-radius: 18px;
      padding: 12px;
      margin: 8px 0;
      font-size: 0.9rem;
      word-break: break-word;
    }

    .code-box {
      background: #0e0f1c;
      border-radius: 24px;
      padding: 18px;
      white-space: pre-wrap;
      font-family: 'Inter', monospace;
      font-size: 0.85rem;
      border: 1px solid #2e3045;
      color: #cbd5f0;
      max-height: 300px;
      overflow-y: auto;
    }

    .toggle-switch {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .api-row {
      background: rgba(0,0,0,0.3);
      border-radius: 60px;
      padding: 5px 5px 5px 18px;
    }

    .hidden { display: none !important; }
    button:disabled { opacity: 0.4; }
  </style>
</head>
<body>
<div class="glass-app" id="app">
  <div class="glass-card">
    <!-- header + light/dark toggle -->
    <div class="toggle-switch">
      <h1 style="font-size: 1.7rem;">✨ AI PromptForge</h1>
      <button class="gradient-btn secondary" style="padding: 10px 16px;" id="themeToggle">🌙 Dark</button>
    </div>

    <!-- Step 0: API key row (stored in localStorage) -->
    <div class="flex-row api-row" style="margin-bottom: 24px;">
      <input type="password" class="input-field" id="apiKeyInput" placeholder="OpenRouter API key" style="flex:1; background:transparent; border:none; padding:12px 0;" value="">
      <button class="gradient-btn" style="padding: 12px 20px;" id="saveApiKey">Save</button>
    </div>

    <!-- progress steps (simple) -->
    <div style="display: flex; justify-content: space-between; margin: 16px 0 30px; color:#aaa;">
      <span>💡 1.Idea</span><span>✨ 2.Analyze</span><span>⚙️ 3.Features</span><span>🎨 4.Theme</span><span>📄 5.Prompt</span>
    </div>

    <!-- STEP 1 – IDEA INPUT (always visible) -->
    <div id="step1">
      <h3>Describe your app idea</h3>
      <div class="flex-row">
        <input type="text" class="input-field" id="ideaInput" placeholder="e.g. Tournament app" value="Note taking app">
        <button class="mic-btn" id="micBtn" title="Speech to text">🎤</button>
        <button class="gradient-btn" id="sendIdeaBtn">Send</button>
      </div>
      <div id="speechTransition" class="hidden" style="margin-top:12px;">🎙️ listening...</div>
    </div>

    <!-- loading indicator (global) -->
    <div id="loadingIndicator" class="hidden" style="margin: 30px 0; text-align: center;"><div class="loader"></div><p style="margin-top:8px;">AI is thinking...</p></div>

    <!-- STEP 2 – AI idea analyzer results (5-7 cards) -->
    <div id="step2" class="hidden">
      <h3>Select trending idea</h3>
      <div id="ideaList" class="card-grid"></div>
      <button class="gradient-btn" id="confirmIdeaBtn" disabled>Next: features</button>
    </div>

    <!-- STEP 3 – feature selection -->
    <div id="step3" class="hidden">
      <h3>Pick features</h3>
      <button class="gradient-btn secondary" id="selectAllFeatures" style="margin-bottom: 12px; width:100%;">✅ ALL FEATURES</button>
      <div id="featuresList" class="card-grid"></div>
      <button class="gradient-btn" id="confirmFeaturesBtn" disabled>Next: theme & fonts</button>
    </div>

    <!-- STEP 4 – theme & font -->
    <div id="step4" class="hidden">
      <h3>Choose theme</h3>
      <div class="flex-row" style="flex-wrap:wrap; gap:8px;" id="themeOptions">
        <button class="pill" data-theme="Dark Glassmorphism">1 Dark Glass</button>
        <button class="pill" data-theme="Dark SaaS Dashboard">2 Dark SaaS</button>
        <button class="pill" data-theme="Cyberpunk Neon">3 Cyberpunk</button>
        <button class="pill" data-theme="Minimal Clean">4 Minimal</button>
        <button class="pill" data-theme="Dark Gradient">5 Dark Grad</button>
      </div>
      <h3 style="margin-top:20px;">Font pair</h3>
      <div class="flex-row" style="flex-wrap:wrap;" id="fontOptions">
        <button class="pill" data-font="A Poppins + Inter">A</button>
        <button class="pill" data-font="B Montserrat + Roboto">B</button>
        <button class="pill" data-font="C Space Grotesk + Inter">C</button>
        <button class="pill" data-font="D Outfit + DM Sans">D</button>
      </div>
      <button class="gradient-btn" id="generateFinalPromptBtn" style="margin-top:24px;">✨ Generate prompt</button>
    </div>

    <!-- STEP 5 – final prompt output + actions -->
    <div id="step5" class="hidden">
      <h3>Your professional prompt</h3>
      <div class="code-box" id="finalPromptDisplay"></div>
      <div class="flex-row" style="justify-content:space-evenly; margin: 16px 0;">
        <button class="gradient-btn secondary" id="copyPromptBtn">📋 Copy</button>
        <button class="gradient-btn secondary" id="downloadPromptBtn">⬇️ .txt</button>
        <button class="gradient-btn secondary" id="regeneratePromptBtn">🔄 Regenerate</button>
        <button class="gradient-btn secondary" id="sharePromptBtn">📤 Share</button>
      </div>
    </div>

    <!-- PROMPT HISTORY -->
    <hr style="margin: 30px 0; border-color: rgba(255,255,255,0.1);">
    <div>
      <div style="display: flex; justify-content: space-between;">
        <h3>📜 History (last 10)</h3>
        <button class="gradient-btn secondary" id="clearHistoryBtn" style="padding:8px 16px;">Clear</button>
      </div>
      <div id="historyContainer"></div>
    </div>

    <!-- error box -->
    <div id="errorMessage" class="hidden" style="background:#ff0033a0; border-radius:30px; padding:12px; margin-top:16px;"></div>
  </div>
</div>

<script>
  (function() {
    // ---------- state & DOM ----------
    const app = document.getElementById('app');
    const apiInput = document.getElementById('apiKeyInput');
    const saveApiBtn = document.getElementById('saveApiKey');
    const micBtn = document.getElementById('micBtn');
    const ideaInput = document.getElementById('ideaInput');
    const sendIdea = document.getElementById('sendIdeaBtn');
    const step1 = document.getElementById('step1');
    const step2 = document.getElementById('step2');
    const step3 = document.getElementById('step3');
    const step4 = document.getElementById('step4');
    const step5 = document.getElementById('step5');
    const loading = document.getElementById('loadingIndicator');
    const errorDiv = document.getElementById('errorMessage');
    const ideaListDiv = document.getElementById('ideaList');
    const confirmIdea = document.getElementById('confirmIdeaBtn');
    const featuresListDiv = document.getElementById('featuresList');
    const selectAllFeatures = document.getElementById('selectAllFeatures');
    const confirmFeatures = document.getElementById('confirmFeaturesBtn');
    const generateFinal = document.getElementById('generateFinalPromptBtn');
    const finalDisplay = document.getElementById('finalPromptDisplay');
    const copyBtn = document.getElementById('copyPromptBtn');
    const downloadBtn = document.getElementById('downloadPromptBtn');
    const regenerateBtn = document.getElementById('regeneratePromptBtn');
    const shareBtn = document.getElementById('sharePromptBtn');
    const historyContainer = document.getElementById('historyContainer');
    const clearHistory = document.getElementById('clearHistoryBtn');
    const themeToggle = document.getElementById('themeToggle');
    const speechTransition = document.getElementById('speechTransition');

    // data
    let apiKey = localStorage.getItem('openrouter_key') || '';
    apiInput.value = apiKey;
    let generatedIdeas = []; // array of strings
    let selectedIdea = '';
    let availableFeatures = []; // array of strings
    let selectedFeatures = new Set();
    let selectedTheme = 'Dark Glassmorphism';
    let selectedFont = 'A Poppins + Inter';
    let finalPromptText = '';
    let history = JSON.parse(localStorage.getItem('prompt_history') || '[]');

    // helper
    function saveApiKeyToStorage() {
      const val = apiInput.value.trim();
      if(val) {
        apiKey = val;
        localStorage.setItem('openrouter_key', val);
        hideError();
      } else {
        showError('Please enter a valid API key');
      }
    }
    saveApiBtn.addEventListener('click', saveApiKeyToStorage);

    // theme toggle (light/dark)
    themeToggle.addEventListener('click', ()=>{
      document.body.classList.toggle('light-mode');
      themeToggle.textContent = document.body.classList.contains('light-mode') ? '☀️ Light' : '🌙 Dark';
    });

    // hide/show error
    function showError(msg) { errorDiv.classList.remove('hidden'); errorDiv.innerText = msg; }
    function hideError() { errorDiv.classList.add('hidden'); }

    // loading
    function setLoading(active) { loading.classList.toggle('hidden', !active); }

    // OpenRouter generic call
    async function callOpenRouter(messages, model = 'openrouter/auto') {
      if (!apiKey) throw new Error('API key missing. Save your key first.');
      const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${apiKey}`,
          'Content-Type': 'application/json',
          'HTTP-Referer': window.location.origin,
        },
        body: JSON.stringify({
          model: model,
          messages: messages,
          temperature: 0.7,
        })
      });
      if (!response.ok) {
        const errText = await response.text();
        throw new Error(`API error (${response.status}): ${errText}`);
      }
      const data = await response.json();
      return data.choices[0].message.content;
    }

    // Step 1 send idea -> analyze -> step2 cards
    sendIdea.addEventListener('click', async ()=>{
      const idea = ideaInput.value.trim();
      if (!idea) return;
      if (!apiKey) { showError('Save API key first'); return; }
      setLoading(true);
      hideError();
      try {
        const prompt = `You are an AI app idea analyzer. Based on "${idea}", generate a list of 5 to 7 trending, related app ideas (only names, numbered, short). Return as plain numbered lines. 1. ... 2. ... etc.`;
        const responseText = await callOpenRouter([{role: 'user', content: prompt}]);
        // parse lines with numbers
        const lines = responseText.split('\n').filter(l => /^\d+\./.test(l.trim()));
        generatedIdeas = lines.map(l => l.replace(/^\d+\.\s*/, '').trim()).slice(0,7);
        if (generatedIdeas.length === 0) throw new Error('Could not parse ideas');
        renderIdeaCards();
        step1.classList.add('hidden');
        step2.classList.remove('hidden');
      } catch (e) {
        showError('Error: ' + e.message);
      } finally {
        setLoading(false);
      }
    });

    function renderIdeaCards() {
      ideaListDiv.innerHTML = '';
      generatedIdeas.forEach((idea, idx) => {
        const card = document.createElement('div');
        card.className = 'idea-card';
        card.innerHTML = `<span class="card-num">${idx+1}</span> ${idea}`;
        card.addEventListener('click', ()=>{
          document.querySelectorAll('.idea-card').forEach(c => c.classList.remove('selected'));
          card.classList.add('selected');
          selectedIdea = idea;
          confirmIdea.disabled = false;
        });
        ideaListDiv.appendChild(card);
      });
    }

    confirmIdea.addEventListener('click', async ()=>{
      if (!selectedIdea) return;
      setLoading(true);
      hideError();
      try {
        const prompt = `Based on the app idea "${selectedIdea}", generate a comprehensive numbered feature list (around 6-8 items) for a web app. Only feature names. Example: 1. User authentication, 2. Dashboard ...`;
        const response = await callOpenRouter([{role: 'user', content: prompt}]);
        const lines = response.split('\n').filter(l => /^\d+\./.test(l.trim()));
        availableFeatures = lines.map(l => l.replace(/^\d+\.\s*/, '').trim());
        if (availableFeatures.length === 0) availableFeatures = ['User authentication','Dashboard','Data management','Admin panel','Analytics','Push notifications'];
        renderFeatures();
        step2.classList.add('hidden');
        step3.classList.remove('hidden');
      } catch (e) {
        showError('Feature gen error: ' + e.message);
      } finally {
        setLoading(false);
      }
    });

    function renderFeatures() {
      featuresListDiv.innerHTML = '';
      selectedFeatures.clear();
      availableFeatures.forEach((feat, idx) => {
        const card = document.createElement('div');
        card.className = 'feature-item';
        card.innerHTML = `<span class="card-num">${idx+1}</span> ${feat}`;
        card.addEventListener('click', (e)=>{
          card.classList.toggle('selected');
          if (card.classList.contains('selected')) selectedFeatures.add(feat);
          else selectedFeatures.delete(feat);
          confirmFeatures.disabled = selectedFeatures.size === 0;
        });
        featuresListDiv.appendChild(card);
      });
    }

    selectAllFeatures.addEventListener('click', ()=>{
      document.querySelectorAll('.feature-item').forEach(card => {
        card.classList.add('selected');
        const feat = card.innerText.replace(/^\d+\s*/, '').trim(); // hacky but works
        availableFeatures.forEach(f => { if (card.innerText.includes(f)) selectedFeatures.add(f); });
      });
      confirmFeatures.disabled = false;
    });

    confirmFeatures.addEventListener('click', ()=>{
      step3.classList.add('hidden');
      step4.classList.remove('hidden');
    });

    // theme/font picks
    document.querySelectorAll('#themeOptions .pill').forEach(btn => {
      btn.addEventListener('click', (e)=>{
        document.querySelectorAll('#themeOptions .pill').forEach(b => b.style.background = '#23253b');
        btn.style.background = '#7f5af0';
        selectedTheme = btn.dataset.theme;
      });
    });
    document.querySelectorAll('#fontOptions .pill').forEach(btn => {
      btn.addEventListener('click', (e)=>{
        document.querySelectorAll('#fontOptions .pill').forEach(b => b.style.background = '#23253b');
        btn.style.background = '#7f5af0';
        selectedFont = btn.dataset.font;
      });
    });

    generateFinal.addEventListener('click', async ()=>{
      setLoading(true);
      hideError();
      try {
        const featureList = Array.from(selectedFeatures).map((f,i)=>`${i+1}. ${f}`).join('\n');
        const messages = [
          {role: 'user', content: `Generate a professional web app development prompt based on:
Idea: ${selectedIdea}
Features:\n${featureList}
UI Theme: ${selectedTheme}
Fonts: ${selectedFont}
Include: app description, feature list, UI instructions, tech stack (HTML/CSS/JS, OpenRouter, etc), hosting compatibility, mobile responsiveness, code structure.`}
        ];
        const promptText = await callOpenRouter(messages);
        finalPromptText = promptText;
        finalDisplay.innerText = promptText;
        // save to history
        history.unshift(promptText.slice(0,100) + (promptText.length>100?'...':''));
        if (history.length > 10) history.pop();
        loca
